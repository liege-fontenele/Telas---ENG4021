<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard de Preços</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background:#f8f9fb; }
</style>
</head>
<body class="min-h-screen text-neutral-900">
  <header class="flex items-center gap-3 px-6 py-5 max-w-5xl mx-auto">
    <button aria-label="Voltar" class="p-2 rounded-md hover:bg-neutral-100">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f5b400" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <h1 class="text-xl font-bold">Dashboard de Preços</h1>
  </header>

  <main class="max-w-5xl mx-auto px-6">
    <!-- Period filter -->
    <div class="flex gap-2 mb-5">
      <button class="px-4 py-1.5 rounded-md text-sm font-medium bg-white border border-neutral-200 hover:bg-neutral-50">7 dias</button>
      <button class="px-4 py-1.5 rounded-md text-sm font-medium bg-white border border-neutral-200 hover:bg-neutral-50">30 dias</button>
      <button class="px-4 py-1.5 rounded-md text-sm font-semibold bg-yellow-400 text-black hover:bg-yellow-500">Todos</button>
    </div>

    <!-- Tabs -->
    <div class="grid grid-cols-3 bg-neutral-100 rounded-lg p-1 mb-5">
      <button class="py-2 rounded-md bg-white text-sm font-medium shadow-sm">Evolução</button>
      <button class="py-2 rounded-md text-sm text-neutral-600 hover:text-neutral-900">Postos</button>
      <button class="py-2 rounded-md text-sm text-neutral-600 hover:text-neutral-900">Área</button>
    </div>

    <!-- Card -->
    <section class="bg-white border border-neutral-200 rounded-xl p-5 shadow-sm">
      <h2 class="font-semibold mb-4">Evolução de Preços por Combustível</h2>
      <div class="h-72 flex items-center justify-center text-neutral-500 text-sm">
        Sem dados suficientes
      </div>
    </section>
  </main>
</body>
</html>
