<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  body{background:#fff;color:#111;min-height:100vh;padding:20px}
  .container{max-width:720px;margin:0 auto}
  .header{display:flex;align-items:center;gap:12px;padding:12px 0 24px;justify-content:center;position:relative}
  .back{position:absolute;left:0;background:none;border:none;cursor:pointer;font-size:24px;color:#111}
  .header h1{font-size:20px;font-weight:700}
  .card{background:#fff;border:1px solid #eee;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .profile{display:flex;align-items:center;gap:16px}
  .avatar{width:64px;height:64px;border-radius:50%;background:#fcd116;display:flex;align-items:center;justify-content:center;color:#111;font-size:28px}
  .name-row{display:flex;align-items:center;gap:8px}
  .name-row h2{font-size:18px;font-weight:700}
  .edit{background:none;border:none;cursor:pointer;color:#666}
  .badge{display:inline-flex;align-items:center;gap:6px;background:#fcd116;color:#111;font-size:13px;font-weight:600;padding:4px 10px;border-radius:999px;margin-top:6px}
  .section-title{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;margin-bottom:14px}
  .star{color:#fcd116}
  .rep-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .rep-value{font-size:32px;font-weight:700}
  .rep-max{color:#888;font-size:14px}
  .progress{height:8px;background:#f1f1f1;border-radius:999px;overflow:hidden;margin-bottom:18px}
  .progress-fill{height:100%;width:50%;background:#fcd116}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .stat{background:#f5f5f5;border-radius:10px;padding:14px;text-align:center}
  .stat-icon{font-size:18px;margin-bottom:6px}
  .stat-num{font-size:20px;font-weight:700}
  .stat-label{font-size:12px;color:#555;margin-top:2px}
  .empty{text-align:center;color:#888;padding:14px 0}
  .install-btn{width:100%;background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
  .logout-btn{width:100%;background:#ef4444;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .logout-btn:hover{background:#dc2626}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <button class="back" aria-label="Voltar">←</button>
    <h1>Meu Perfil</h1>
  </div>

  <div class="card">
    <div class="profile">
      <div class="avatar">👤</div>
      <div>
        <div class="name-row">
          <h2>Usuário</h2>
          <button class="edit" aria-label="Editar">✏️</button>
        </div>
        <span class="badge">🏅 Colaborador Prata</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title"><span class="star">★</span> Reputação</div>
    <div class="rep-row">
      <span class="rep-value">50</span>
      <span class="rep-max">/ 100</span>
    </div>
    <div class="progress"><div class="progress-fill"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-icon">📈</div><div class="stat-num">0</div><div class="stat-label">Contribuições</div></div>
      <div class="stat"><div class="stat-icon" style="color:#22c55e">★</div><div class="stat-num">0</div><div class="stat-label">Validadas</div></div>
      <div class="stat"><div class="stat-icon" style="color:#ef4444">⚠</div><div class="stat-num">0</div><div class="stat-label">Rejeitadas</div></div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">⛽ Histórico de Contribuições</div>
    <div class="empty">Nenhuma contribuição ainda</div>
  </div>

  <div class="card">
    <div class="section-title">🚩 Denúncias Realizadas</div>
    <div class="empty">Nenhuma denúncia realizada</div>
  </div>

  <button class="install-btn">⬇ Instalar o App no Celular</button>
  <button class="logout-btn">⎋ Sair da Conta</button>
</div>
</body>
</html>
